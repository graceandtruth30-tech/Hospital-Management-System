<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HMS Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">HMS Dashboard</a>
      <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
    </div>
  </nav>
  <div class="container py-5">
    <div class="row">
      <div class="col-md-4">
        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <h5 class="card-title">Patients</h5>
            <p class="card-text">View and manage patient records.</p>
            <button class="btn btn-primary w-100" id="loadPatients">Load Patients</button>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <h5 class="card-title">Doctors</h5>
            <p class="card-text">View and manage doctor details.</p>
            <button class="btn btn-primary w-100" id="loadDoctors">Load Doctors</button>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <h5 class="card-title">Appointments</h5>
            <p class="card-text">View scheduled appointments.</p>
            <button class="btn btn-primary w-100" id="loadAppointments">Load Appointments</button>
          </div>
        </div>
      </div>
    </div>
    <div id="dashboardContent"></div>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
