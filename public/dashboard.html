<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HMS Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">HMS Dashboard</a>
      <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
    </div>
  </nav>
  <div class="container py-5">
    <div class="row mb-4">
      <div class="col">
        <ul class="nav nav-tabs" id="entityTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="patients-tab" data-bs-toggle="tab" data-bs-target="#patients" type="button" role="tab">Patients</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="doctors-tab" data-bs-toggle="tab" data-bs-target="#doctors" type="button" role="tab">Doctors</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="appointments-tab" data-bs-toggle="tab" data-bs-target="#appointments" type="button" role="tab">Appointments</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="records-tab" data-bs-toggle="tab" data-bs-target="#records" type="button" role="tab">Medical Records</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="bills-tab" data-bs-toggle="tab" data-bs-target="#bills" type="button" role="tab">Bills</button>
          </li>
        </ul>
      </div>
    </div>

    <div class="tab-content" id="entityTabsContent">
      <div class="tab-pane fade show active" id="patients" role="tabpanel">
        <div class="row g-4">
          <div class="col-lg-4">
            <div class="card shadow-sm">
              <div class="card-body">
                <h5 class="card-title">Patient</h5>
                <div id="patientAlert"></div>
                <form id="patientForm">
                  <input type="hidden" id="patientId">
                  <div class="mb-2"><label class="form-label">Full Name</label><input class="form-control" id="patientFullname" required></div>
                  <div class="mb-2"><label class="form-label">Gender</label><select class="form-select" id="patientGender"><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option></select></div>
                  <div class="mb-2"><label class="form-label">Date of Birth</label><input type="date" class="form-control" id="patientDob"></div>
                  <div class="mb-2"><label class="form-label">Phone</label><input class="form-control" id="patientPhone"></div>
                  <div class="mb-2"><label class="form-label">Address</label><textarea class="form-control" id="patientAddress" rows="2"></textarea></div>
                  <div class="mb-2"><label class="form-label">Blood Group</label><input class="form-control" id="patientBloodGroup"></div>
                  <div class="mb-2"><label class="form-label">Emergency Contact</label><input class="form-control" id="patientEmergencyContact"></div>
                  <button class="btn btn-primary w-100" type="submit">Save Patient</button>
                </form>
              </div>
            </div>
          </div>
          <div class="col-lg-8">
            <div class="card shadow-sm">
              <div class="card-body">
                <h5 class="card-title">Patient List</h5>
                <div id="patientList"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="doctors" role="tabpanel">
        <div class="row g-4">
          <div class="col-lg-4">
            <div class="card shadow-sm">
              <div class="card-body">
                <h5 class="card-title">Doctor</h5>
                <div id="doctorAlert"></div>
                <form id="doctorForm">
                  <input type="hidden" id="doctorId">
                  <div class="mb-2"><label class="form-label">Full Name</label><input class="form-control" id="doctorFullname" required></div>
                  <div class="mb-2"><label class="form-label">Specialization</label><input class="form-control" id="doctorSpecialization"></div>
                  <div class="mb-2"><label class="form-label">Phone</label><input class="form-control" id="doctorPhone"></div>
                  <div class="mb-2"><label class="form-label">Email</label><input type="email" class="form-control" id="doctorEmail"></div>
                  <div class="mb-2"><label class="form-label">Department</label><input class="form-control" id="doctorDepartment"></div>
                  <button class="btn btn-primary w-100" type="submit">Save Doctor</button>
                </form>
              </div>
            </div>
          </div>
          <div class="col-lg-8">
            <div class="card shadow-sm">
              <div class="card-body">
                <h5 class="card-title">Doctor List</h5>
                <div id="doctorList"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="appointments" role="tabpanel">
        <div class="row g-4">
          <div class="col-lg-4">
            <div class="card shadow-sm">
              <div class="card-body">
                <h5 class="card-title">Appointment</h5>
                <div id="appointmentAlert"></div>
                <form id="appointmentForm">
                  <input type="hidden" id="appointmentId">
                  <div class="mb-2"><label class="form-label">Patient ID</label><input type="number" class="form-control" id="appointmentPatientId" required></div>
                  <div class="mb-2"><label class="form-label">Doctor ID</label><input type="number" class="form-control" id="appointmentDoctorId" required></div>
                  <div class="mb-2"><label class="form-label">Date</label><input type="date" class="form-control" id="appointmentDate"></div>
                  <div class="mb-2"><label class="form-label">Time</label><input type="time" class="form-control" id="appointmentTime"></div>
                  <div class="mb-2"><label class="form-label">Status</label><select class="form-select" id="appointmentStatus"><option value="scheduled">Scheduled</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select></div>
                  <button class="btn btn-primary w-100" type="submit">Save Appointment</button>
                </form>
              </div>
            </div>
          </div>
          <div class="col-lg-8">
            <div class="card shadow-sm">
              <div class="card-body">
                <h5 class="card-title">Appointment List</h5>
                <div id="appointmentList"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="records" role="tabpanel">
        <div class="row g-4">
          <div class="col-lg-4">
            <div class="card shadow-sm">
              <div class="card-body">
                <h5 class="card-title">Medical Record</h5>
                <div id="recordAlert"></div>
                <form id="recordForm">
                  <input type="hidden" id="recordId">
                  <div class="mb-2"><label class="form-label">Patient ID</label><input type="number" class="form-control" id="recordPatientId" required></div>
                  <div class="mb-2"><label class="form-label">Doctor ID</label><input type="number" class="form-control" id="recordDoctorId" required></div>
                  <div class="mb-2"><label class="form-label">Diagnosis</label><textarea class="form-control" id="recordDiagnosis" rows="2"></textarea></div>
                  <div class="mb-2"><label class="form-label">Prescription</label><textarea class="form-control" id="recordPrescription" rows="2"></textarea></div>
                  <div class="mb-2"><label class="form-label">Notes</label><textarea class="form-control" id="recordNotes" rows="2"></textarea></div>
                  <div class="mb-2"><label class="form-label">Record Date</label><input type="date" class="form-control" id="recordDate"></div>
                  <button class="btn btn-primary w-100" type="submit">Save Record</button>
                </form>
              </div>
            </div>
          </div>
          <div class="col-lg-8">
            <div class="card shadow-sm">
              <div class="card-body">
                <h5 class="card-title">Medical Record List</h5>
                <div id="recordList"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="bills" role="tabpanel">
        <div class="row g-4">
          <div class="col-lg-4">
            <div class="card shadow-sm">
              <div class="card-body">
                <h5 class="card-title">Bill</h5>
                <div id="billAlert"></div>
                <form id="billForm">
                  <input type="hidden" id="billId">
                  <div class="mb-2"><label class="form-label">Patient ID</label><input type="number" class="form-control" id="billPatientId" required></div>
                  <div class="mb-2"><label class="form-label">Consultation Fee</label><input type="number" step="0.01" class="form-control" id="billConsultationFee"></div>
                  <div class="mb-2"><label class="form-label">Medication Fee</label><input type="number" step="0.01" class="form-control" id="billMedicationFee"></div>
                  <div class="mb-2"><label class="form-label">Laboratory Fee</label><input type="number" step="0.01" class="form-control" id="billLaboratoryFee"></div>
                  <div class="mb-2"><label class="form-label">Payment Status</label><select class="form-select" id="billPaymentStatus"><option value="pending">Pending</option><option value="paid">Paid</option><option value="partial">Partial</option></select></div>
                  <button class="btn btn-primary w-100" type="submit">Save Bill</button>
                </form>
              </div>
            </div>
          </div>
          <div class="col-lg-8">
            <div class="card shadow-sm">
              <div class="card-body">
                <h5 class="card-title">Bill List</h5>
                <div id="billList"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
